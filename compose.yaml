name: muisbakery

x-database-environment: &database-environment
  POSTGRES_DB: ${POSTGRES_DB:-muisbakery}
  POSTGRES_USER: ${POSTGRES_USER:-muisbakery}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muisbakery_local}

x-api-environment: &api-environment
  NODE_ENV: development
  API_PORT: 3001
  DATABASE_URL: postgresql://${POSTGRES_USER:-muisbakery}:${POSTGRES_PASSWORD:-muisbakery_local}@db:5432/${POSTGRES_DB:-muisbakery}
  DIRECT_URL: postgresql://${POSTGRES_USER:-muisbakery}:${POSTGRES_PASSWORD:-muisbakery_local}@db:5432/${POSTGRES_DB:-muisbakery}
  WEB_ORIGIN: http://${PUBLIC_HOST:-localhost}:${WEB_HOST_PORT:-3000}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-docker-jwt-secret-change-before-sharing}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-local-docker-internal-api-secret-change-me}

services:
  db:
    image: postgres:16-alpine
    environment:
      <<: *database-environment
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  setup:
    build:
      context: .
      target: api-tools
    environment:
      <<: *api-environment
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@muisbakery.local}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Muis Bakery Admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-}
      SEED_MODE: ${SEED_MODE:-bootstrap}
      SKIP_SEED: ${SKIP_SEED:-0}
      FORCE_RESEED: ${FORCE_RESEED:-0}
    command: ["sh", "docker/local-setup.sh"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - setup_state:/state
    restart: "no"

  backup:
    profiles: ["backup"]
    build:
      context: .
      target: backup
    environment:
      TZ: ${BACKUP_TIMEZONE:-Africa/Lagos}
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-muisbakery}
      PGUSER: ${POSTGRES_USER:-muisbakery}
      PGPASSWORD: ${POSTGRES_PASSWORD:-muisbakery_local}
      SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-}
      SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
      SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-database}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETRY_SECONDS: ${BACKUP_RETRY_SECONDS:-900}
      BACKUP_LOCAL_RETENTION_DAYS: ${BACKUP_LOCAL_RETENTION_DAYS:-7}
    command: ["daemon"]
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - database_backups:/backups
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    environment:
      <<: *api-environment
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${API_HOST_PORT:-3001}:3001"
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    init: true
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST:-localhost}:${API_HOST_PORT:-3001}
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST:-localhost}:${API_HOST_PORT:-3001}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-local-docker-internal-api-secret-change-me}
      RECEIPT_BUSINESS_NAME: ${RECEIPT_BUSINESS_NAME:-Muis Bakery}
      RECEIPT_BUSINESS_ADDRESS: ${RECEIPT_BUSINESS_ADDRESS:-}
      RECEIPT_BUSINESS_PHONE: ${RECEIPT_BUSINESS_PHONE:-}
      RECEIPT_RETURN_POLICY: ${RECEIPT_RETURN_POLICY:-Please retain this receipt for returns.}
      RECEIPT_PRINT_BRIDGE_URL: ${RECEIPT_PRINT_BRIDGE_URL:-}
      RECEIPT_PRINT_BRIDGE_TOKEN: ${PRINT_BRIDGE_TOKEN:-}
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    init: true
    restart: unless-stopped

volumes:
  postgres_data:
  setup_state:
  database_backups:
